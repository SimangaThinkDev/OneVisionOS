# OneVisionOS Kernel Tuning
# Optimized for older laptops (MacBooks / HP All-in-Ones)

# Reduce swappiness to prolong life of older SSDs
vm.swappiness=10

# Increase inotify watches for security/healing daemons
fs.inotify.max_user_watches=524288

# Improve network performance
net.core.somaxconn=1024
